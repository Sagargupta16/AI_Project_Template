name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

categories:
  - title: "Features"
    labels: [feature, enhancement, feat]
  - title: "Bug Fixes"
    labels: [fix, bugfix, bug]
  - title: "Documentation"
    labels: [docs, documentation]
  - title: "Maintenance"
    labels: [chore, maintenance, refactor, test, ci]
  - title: "Dependencies"
    labels: [dependencies, deps]
    collapse-after: 5

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels: [major, breaking]
  minor:
    labels: [minor, feature, feat, enhancement]
  patch:
    labels: [patch, fix, bug, bugfix, chore, docs, deps]
  default: patch

template: |
  ## What's Changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
