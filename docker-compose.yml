services:
  api:
    build: .
    container_name: ai_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1

  notebook:
    build: .
    container_name: ai_notebook
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./notebooks:/app/notebooks
      - ./src:/app/src
    env_file:
      - .env
    command: uv run jupyter notebook --ip=0.0.0.0 --port=8888 --no-browser --allow-root
